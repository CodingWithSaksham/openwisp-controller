name: OpenWISP Controller CI Build

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - Dockerfile.ci
      - requirements.txt
      - requirements-test.txt
  workflow_run:
    workflows: ["Build CI Base Image"]
    types:
      - completed
  pull_request:
    branches:
      - master
      - "1.1"
      - "1.2"
      - "gsoc26-x509-certificate-generator-templates"
      - "gsoc26-mass-commands"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  # Quickly checks whether our pre-built GHCR image is available.
  # Outputs the container image tag every downstream job should use.
  # If the image is missing (e.g. first boot of a fork), falls back to
  # plain ubuntu:24.04 and every job installs apt deps the slow way.
  check-image:
    name: Check pre-built CI image
    runs-on: ubuntu-24.04
    outputs:
      image_tag: ${{ steps.probe.outputs.image_tag }}
      use_prebuilt: ${{ steps.probe.outputs.use_prebuilt }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe image availability
        id: probe
        run: |
          IMAGE="${{ format('ghcr.io/{0}/ci-base:latest', github.repository) }}"
          IMAGE="${IMAGE,,}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Pre-built image found: $IMAGE"
            echo "image_tag=$IMAGE"    >> $GITHUB_OUTPUT
            echo "use_prebuilt=true"  >> $GITHUB_OUTPUT
          else
            echo "Pre-built image not found, falling back to ghcr.io/catthehacker/ubuntu:act-24.04"
            echo "image_tag=ghcr.io/catthehacker/ubuntu:act-24.04" >> $GITHUB_OUTPUT
            echo "use_prebuilt=false"     >> $GITHUB_OUTPUT
          fi

  # Lint / format checks
  qa:
    name: Code Quality Checks
    needs: check-image
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.check-image.outputs.image_tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha}}
          persist-credentials: false

      - name: Mark repo as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install system deps (fallback)
        if: needs.check-image.outputs.use_prebuilt != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git nodejs npm python3 python3-pip
          npm install -g prettier

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/requirements*.txt"

      - name: Set up Python and QA dependencies
        run: |
          uv venv --python 3.12 /opt/venv
          echo "/opt/venv/bin" >> "$GITHUB_PATH"
          uv pip install --python /opt/venv -r requirements-test.txt -e .

      - name: Run QA checks
        run: ./run-qa-checks

  test:
    name: "py${{ matrix.python-version }} | ${{ matrix.django-version }} | ${{ matrix.test-group }}"
    needs:
      - check-image
      - qa
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.check-image.outputs.image_tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: >-
        --tmpfs /tmp
        --shm-size 2g
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        django-version:
          - django~=4.2.0
          - django~=5.1.0
          - django~=5.2.0
        test-group:
          - standard
          - selenium
          - sample_app
        exclude:
          - python-version: "3.13"
            django-version: django~=4.2.0

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha}}
          persist-credentials: false

      - name: Mark repo as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install system deps (fallback)
        if: needs.check-image.outputs.use_prebuilt != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            git sqlite3 gdal-bin libproj-dev libgeos-dev \
            libspatialite-dev spatialite-bin libsqlite3-mod-spatialite

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/requirements*.txt"

      - name: Set up Python ${{ matrix.python-version }} and dependencies
        id: deps
        run: |
          uv venv --python ${{ matrix.python-version }} /opt/venv
          echo "/opt/venv/bin" >> "$GITHUB_PATH"
          uv pip install --python /opt/venv -r requirements-test.txt -e . "${{ matrix.django-version }}"

      - name: Run standard tests
        if: ${{ !cancelled() && steps.deps.conclusion == 'success' && matrix.test-group == 'standard' }}
        env:
          SELENIUM_HEADLESS: 1
          REDIS_URL: redis://redis:6379/0
        run: |
          coverage run runtests.py --parallel --exclude-tag=selenium_tests \
            || coverage run runtests.py --exclude-tag=selenium_tests
          coverage combine

      - name: Run selenium tests
        if: ${{ !cancelled() && steps.deps.conclusion == 'success' && matrix.test-group == 'selenium' }}
        env:
          SELENIUM_HEADLESS: 1
          GECKO_LOG: 1
          REDIS_URL: redis://redis:6379/0
        run: |
          coverage run runtests.py --tag=selenium_tests --no-input --exclude-pytest
          coverage combine

      - name: Upload geckodriver logs on failure
        if: ${{ failure() && matrix.test-group == 'selenium' }}
        uses: actions/upload-artifact@v4
        with:
          name: geckodriver-logs-py${{ matrix.python-version }}-${{ matrix.django-version }}
          path: geckodriver*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Run sample_app tests
        if: ${{ !cancelled() && steps.deps.conclusion == 'success' && matrix.test-group == 'sample_app' }}
        env:
          SAMPLE_APP: "1"
          REDIS_URL: redis://redis:6379/0
        run: |
          coverage run runtests.py --parallel --exclude-tag=selenium_tests \
            || coverage run runtests.py --exclude-tag=selenium_tests
          coverage combine

      - name: Rename coverage file for artifact upload
        if: |
          success() &&
          matrix.python-version == '3.13' &&
          matrix.django-version == 'django~=5.2.0'
        run: mv .coverage .coverage.${{ matrix.test-group }}

      - name: Upload coverage artifact
        if: |
          success() &&
          matrix.python-version == '3.13' &&
          matrix.django-version == 'django~=5.2.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.test-group }}
          path: .coverage.${{ matrix.test-group }}
          retention-days: 1

  coverage-combine:
    name: Combine and upload coverage
    needs: test
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install coverage
        run: pip install coverage

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: coverage-*
          path: coverage_parts
          merge-multiple: true

      - name: Combine and generate XML report
        run: |
          if [ -z "$(ls -A coverage_parts 2>/dev/null)" ]; then
            echo "No coverage artifacts found, skipping."
            exit 0
          fi
          coverage combine coverage_parts/
          coverage xml

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          files: coverage.xml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false

  coveralls:
    name: Finalize Coveralls
    needs: coverage-combine
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Coveralls finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          fail-on-error: false
