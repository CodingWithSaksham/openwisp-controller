name: Build CI Base Image

# Rebuild the pre-baked dependency image whenever the Dockerfile or
# test requirements change, and allow manual triggering.
on:
  push:
    branches:
      - "**"
    paths:
      - Dockerfile.ci
      - requirements-test.txt
      - requirements.txt
      - .github/workflows/build-ci-image.yml
  workflow_dispatch:

concurrency:
  group: build-ci-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push CI base image to GHCR
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BuildKit cache stored in GitHub Actions cache — subsequent builds
      # only rebuild layers that actually changed (e.g. only the npm layer
      # when prettier is bumped, not the whole apt layer).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          push: true
          # BuildKit layer cache in GHA cache storage
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/ci-base:latest
            ghcr.io/${{ steps.repo.outputs.name }}/ci-base:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Verify image
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          docker pull "ghcr.io/${REPO}/ci-base:latest"
          docker run --rm "ghcr.io/${REPO}/ci-base:latest" \
            bash -c "gdalinfo --version && node --version && prettier --version"
